<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Text</title>
  <meta name="description" content="Daily Text — your daily scripture, every day." />
  <style>
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #0a84ff;
      --border: #e5e5ea;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --card: #1c1c1e;
        --text: #f5f5f7;
        --muted: #98989d;
        --accent: #0a84ff;
        --border: #2c2c2e;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      max-width: 440px;
      width: 100%;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }
    .icon {
      width: 88px; height: 88px;
      border-radius: 20px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #0a84ff, #5e5ce6);
      display: flex; align-items: center; justify-content: center;
      font-size: 44px;
    }
    h1 { font-size: 28px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.02em; }
    p.tagline { color: var(--muted); font-size: 17px; line-height: 1.5; margin: 0 0 28px; }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 14px;
      transition: opacity 0.2s ease;
    }
    .btn:active { opacity: 0.7; }
    footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon" aria-hidden="true">📖</div>
    <h1>Daily Text</h1>
    <p class="tagline">Your daily scripture, every day — read it, save your favorites, and get a gentle daily reminder.</p>

    <a class="btn" href="https://apps.apple.com/app/id1485688655">Download on the App Store</a>

    <footer>
      &copy; 2026 Daily Text
    </footer>
  </main>
</body>
</html>
